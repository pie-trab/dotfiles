# --- General Settings ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm*:Tc"
set -g history-limit 10000                 # Bigger scrollback buffer
set -s escape-time 0                       # Remove delay when hitting Esc (crucial for Vim/Neovim)
set -g mouse on                            # Enable mouse (scrolling, resizing panes, clicking tabs)
